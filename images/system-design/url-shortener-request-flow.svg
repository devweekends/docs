<svg viewBox="0 0 800 390" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="url-arrow-red" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
    <marker id="url-arrow-teal" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ecca3"/>
    </marker>
    <marker id="url-arrow-purple" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#533483"/>
    </marker>
  </defs>

  <rect width="800" height="390" rx="12" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" fill="#f5f5f5" font-size="16" font-weight="bold" font-family="system-ui, sans-serif">URL Shortener - Request Flow Architecture</text>

  <!-- Row 1 -->
  <rect x="20" y="60" width="110" height="50" rx="8" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="75" y="82" text-anchor="middle" fill="#f5f5f5" font-size="13" font-family="system-ui, sans-serif">Client</text>
  <text x="75" y="98" text-anchor="middle" fill="#999" font-size="10" font-family="system-ui, sans-serif">Browser/App</text>

  <rect x="180" y="60" width="120" height="50" rx="8" fill="#0f3460" stroke="#533483" stroke-width="2"/>
  <text x="240" y="82" text-anchor="middle" fill="#f5f5f5" font-size="13" font-family="system-ui, sans-serif">API Gateway</text>
  <text x="240" y="98" text-anchor="middle" fill="#999" font-size="10" font-family="system-ui, sans-serif">Load Balancer</text>

  <rect x="350" y="60" width="120" height="50" rx="8" fill="#0f3460" stroke="#533483" stroke-width="2"/>
  <text x="410" y="82" text-anchor="middle" fill="#f5f5f5" font-size="13" font-family="system-ui, sans-serif">API Server</text>
  <text x="410" y="98" text-anchor="middle" fill="#999" font-size="10" font-family="system-ui, sans-serif">Create / Redirect</text>

  <rect x="540" y="60" width="110" height="50" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="2"/>
  <text x="595" y="82" text-anchor="middle" fill="#f5f5f5" font-size="13" font-family="system-ui, sans-serif">Database</text>
  <text x="595" y="98" text-anchor="middle" fill="#999" font-size="10" font-family="system-ui, sans-serif">DynamoDB</text>

  <rect x="680" y="60" width="100" height="50" rx="8" fill="#16213e" stroke="#533483" stroke-width="2"/>
  <text x="730" y="82" text-anchor="middle" fill="#f5f5f5" font-size="13" font-family="system-ui, sans-serif">Analytics</text>
  <text x="730" y="98" text-anchor="middle" fill="#999" font-size="10" font-family="system-ui, sans-serif">Kafka Pipeline</text>

  <!-- Row 2 -->
  <rect x="350" y="155" width="120" height="50" rx="8" fill="#533483" stroke="#e94560" stroke-width="2"/>
  <text x="410" y="177" text-anchor="middle" fill="#f5f5f5" font-size="13" font-family="system-ui, sans-serif">Key Generation</text>
  <text x="410" y="193" text-anchor="middle" fill="#f5f5f5" font-size="10" font-family="system-ui, sans-serif">Service (KGS)</text>

  <rect x="540" y="155" width="110" height="50" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="2"/>
  <text x="595" y="177" text-anchor="middle" fill="#f5f5f5" font-size="13" font-family="system-ui, sans-serif">Redis Cache</text>
  <text x="595" y="193" text-anchor="middle" fill="#999" font-size="10" font-family="system-ui, sans-serif">Cache-Aside</text>

  <!-- Main row arrows -->
  <line x1="130" y1="85" x2="177" y2="85" stroke="#e94560" stroke-width="2" marker-end="url(#url-arrow-red)"/>
  <line x1="300" y1="85" x2="347" y2="85" stroke="#e94560" stroke-width="2" marker-end="url(#url-arrow-red)"/>
  <line x1="470" y1="85" x2="537" y2="85" stroke="#e94560" stroke-width="2" marker-end="url(#url-arrow-red)"/>
  <line x1="650" y1="85" x2="677" y2="85" stroke="#533483" stroke-width="1.5" marker-end="url(#url-arrow-purple)"/>

  <!-- API Server -> KGS -->
  <line x1="410" y1="110" x2="410" y2="152" stroke="#e94560" stroke-width="2" marker-end="url(#url-arrow-red)"/>

  <!-- KGS -> Database: hands back the generated key to be stored -->
  <line x1="470" y1="160" x2="537" y2="115" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#url-arrow-red)"/>
  <text x="500" y="135" fill="#e94560" font-size="9" font-family="system-ui, sans-serif">store key</text>

  <!-- API Server -> Redis Cache -->
  <line x1="463" y1="108" x2="538" y2="167" stroke="#4ecca3" stroke-width="2" marker-end="url(#url-arrow-teal)"/>

  <!-- Redis Cache <-> Database: cache miss lookup / populate -->
  <line x1="585" y1="155" x2="585" y2="113" stroke="#4ecca3" stroke-width="1.5" marker-end="url(#url-arrow-teal)"/>
  <text x="540" y="135" fill="#4ecca3" font-size="9" font-family="system-ui, sans-serif">miss</text>
  <line x1="610" y1="113" x2="610" y2="155" stroke="#4ecca3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#url-arrow-teal)"/>
  <text x="615" y="135" fill="#4ecca3" font-size="9" font-family="system-ui, sans-serif">populate</text>

  <!-- Legend -->
  <rect x="30" y="245" width="740" height="120" rx="8" fill="#16213e" opacity="0.6"/>
  <text x="55" y="270" fill="#e94560" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">CREATE FLOW (Write):</text>
  <text x="55" y="290" fill="#f5f5f5" font-size="12" font-family="system-ui, sans-serif">Client --&gt; API Gateway --&gt; API Server --&gt; KGS (get unique key) --&gt; Database (store mapping) --&gt; Return short URL</text>
  <text x="55" y="320" fill="#4ecca3" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">REDIRECT FLOW (Read):</text>
  <text x="55" y="340" fill="#f5f5f5" font-size="12" font-family="system-ui, sans-serif">Client --&gt; API Gateway --&gt; API Server --&gt; Redis Cache (hit?) --&gt; If miss: Database --&gt; Cache populate --&gt; HTTP 302</text>
  <text x="55" y="360" fill="#999" font-size="11" font-family="system-ui, sans-serif">Async: Click event logged to Kafka analytics pipeline (non-blocking)</text>
</svg>
